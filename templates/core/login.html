    <!-- ===== Panneau droit : formulaire ===== -->
    <main class="flex-1 flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-md fade-up">

            <!-- En-tête mobile (caché sur desktop) -->
            <div class="lg:hidden flex items-center gap-2 mb-8">
                <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-white">
                        <path d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/>
                    </svg>
                </div>
                <span class="text-lg font-bold text-white">GesStock <span class="text-blue-400">Madina</span></span>
            </div>

            <!-- Card formulaire -->
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 px-8 py-10">
                <div class="text-center mb-8">
                    <h1 class="text-xl font-bold text-gray-900 mb-2">BIENVENNU CHEZ BAILLO-STOCK-MADINA</h1>
                    <h2 class="text-2xl font-bold text-gray-900">Connexion</h2>
                    <p class="mt-1 text-sm text-gray-500">Entrez vos identifiants pour accéder à votre espace.</p>
                </div>

                {% if form.errors %}
                <div class="mb-5 flex items-start gap-3 rounded-lg bg-red-50 border border-red-200 px-4 py-3">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 text-red-500 shrink-0 mt-0.5">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z" clip-rule="evenodd"/>
                    </svg>
                    <p class="text-sm text-red-700 font-medium">Identifiant ou mot de passe incorrect.</p>
                </div>
                {% endif %}

                <form method="post" class="space-y-5">
                    {% csrf_token %}
                    {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                    {% endif %}

                    <!-- Champ identifiant -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Identifiant</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 text-gray-400">
                                    <path d="M10 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3.465 14.493a1.23 1.23 0 0 0 .41 1.412A9.957 9.957 0 0 0 10 18c2.31 0 4.438-.784 6.131-2.1.43-.333.604-.903.408-1.41a7.002 7.002 0 0 0-13.074.003Z"/>
                                </svg>
                            </span>
                            <input type="text" name="username" autofocus required
                                class="input-field w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm bg-white text-gray-900 placeholder-gray-400"
                                placeholder="Nom d'utilisateur">
                        </div>
                    </div>

                    <!-- Champ mot de passe -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Mot de passe</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 text-gray-400">
                                    <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 0 0-4.5 4.5V9H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-.5V5.5A4.5 4.5 0 0 0 10 1Zm3 8V5.5a3 3 0 1 0-6 0V9h6Z" clip-rule="evenodd"/>
                                </svg>
                            </span>
                            <input type="password" name="password" required
                                class="input-field w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm bg-white text-gray-900 placeholder-gray-400"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <!-- Bouton connexion -->
                    <button type="submit"
                        class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 active:scale-[.98] text-white font-semibold text-sm py-2.5 rounded-lg transition-all duration-150 mt-2">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                            <path fill-rule="evenodd" d="M3 4.25A2.25 2.25 0 0 1 5.25 2h5.5A2.25 2.25 0 0 1 13 4.25v2a.75.75 0 0 1-1.5 0v-2a.75.75 0 0 0-.75-.75h-5.5a.75.75 0 0 0-.75.75v11.5c0 .414.336.75.75.75h5.5a.75.75 0 0 0 .75-.75v-2a.75.75 0 0 1 1.5 0v2A2.25 2.25 0 0 1 10.75 18h-5.5A2.25 2.25 0 0 1 3 15.75V4.25Z" clip-rule="evenodd"/>
                            <path fill-rule="evenodd" d="M19 10a.75.75 0 0 0-.75-.75H8.704l1.048-1.08a.75.75 0 1 0-1.04-1.08l-2.5 2.571a.75.75 0 0 0 0 1.037l2.5 2.572a.75.75 0 1 0 1.04-1.08L8.704 10.75H18.25A.75.75 0 0 0 19 10Z" clip-rule="evenodd"/>
                        </svg>
                        Se connecter
                    </button>
                </form>
            </div>

            <p class="mt-6 text-center text-xs text-gray-500">&copy; 2026 GesStock Madina</p>
        </div>
    </main>
