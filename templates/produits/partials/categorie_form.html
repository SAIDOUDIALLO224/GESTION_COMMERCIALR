<div id="cat-form-zone" class="bg-gray-50 border border-gray-200 rounded-lg p-4">
  <p class="text-sm font-semibold text-gray-700 mb-3">
    {% if categorie %}Modifier «{{ categorie.nom }}»{% else %}Nouvelle catégorie{% endif %}
  </p>
  <form
    hx-post="{{ action_url }}"
    hx-target="#categories-panel"
    hx-swap="outerHTML"
    class="flex flex-col sm:flex-row gap-3 items-start">
    {% csrf_token %}
    <div class="flex-1">
      {{ form.nom }}
      {% if form.nom.errors %}<p class="mt-1 text-xs text-red-600">{{ form.nom.errors.0 }}</p>{% endif %}
    </div>
    <div class="flex-1">
      <input type="text" name="description"
             value="{{ form.description.value|default:'' }}"
             placeholder="Description (optionnel)"
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="flex gap-2 flex-shrink-0">
      <button type="submit"
              class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
        {% if categorie %}Enregistrer{% else %}Ajouter{% endif %}
      </button>
      {% if categorie %}
      <button type="button"
              hx-get="{% url 'produits:categorie_creer' %}"
              hx-target="#cat-form-zone"
              hx-swap="outerHTML"
              class="px-4 py-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm font-medium rounded-lg transition-colors">
        Annuler
      </button>
      {% endif %}
    </div>
  </form>
</div>
