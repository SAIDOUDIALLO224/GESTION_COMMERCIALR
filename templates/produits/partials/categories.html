<div id="categories-panel">

  {% if delete_error %}
  <div class="mb-3 p-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700">{{ delete_error }}</div>
  {% endif %}

  <!-- Formulaire d'ajout rapide -->
  <div id="cat-form-zone"
       hx-get="{% url 'produits:categorie_creer' %}"
       hx-trigger="revealed"
       hx-target="#cat-form-zone"
       hx-swap="outerHTML">
    <div class="flex items-center justify-center py-4">
      <span class="text-sm text-gray-400">Chargement…</span>
    </div>
  </div>

  <!-- Liste des catégories -->
  <div class="mt-4 overflow-hidden rounded-lg border border-gray-200">
    {% if categories %}
    <table class="min-w-full divide-y divide-gray-200 text-sm">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">Nom</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">Description</th>
          <th class="px-4 py-3 text-center font-semibold text-gray-600">Produits</th>
          <th class="px-4 py-3 text-center font-semibold text-gray-600">Actions</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-100" id="cat-rows">
        {% for cat in categories %}
        <tr id="cat-row-{{ cat.pk }}" class="hover:bg-gray-50 transition-colors">
          <td class="px-4 py-2.5 font-medium text-gray-900">{{ cat.nom }}</td>
          <td class="px-4 py-2.5 text-gray-500">{{ cat.description|default:"—" }}</td>
          <td class="px-4 py-2.5 text-center">
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-700">{{ cat.nb_produits }}</span>
          </td>
          <td class="px-4 py-2.5 text-center">
            <div class="flex items-center justify-center gap-1">
              <button
                hx-get="{% url 'produits:categorie_modifier' cat.pk %}"
                hx-target="#cat-form-zone"
                hx-swap="outerHTML"
                class="p-1.5 rounded text-orange-500 hover:bg-orange-50 transition-colors" title="Modifier">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              </button>
              <button
                hx-get="{% url 'produits:categorie_supprimer' cat.pk %}"
                hx-target="#cat-row-{{ cat.pk }}"
                hx-swap="outerHTML"
                class="p-1.5 rounded text-red-500 hover:bg-red-50 transition-colors" title="Supprimer">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <div class="py-10 text-center text-gray-400 text-sm">Aucune catégorie. Ajoutez-en une ci-dessus.</div>
    {% endif %}
  </div>
</div>
