{% extends 'base.html' %}
{% load humanize %}

{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{{ form.client.label }}</label>
                    {{ form.client }}
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{{ form.montant.label }}</label>
                    {{ form.montant }}
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{{ form.mode_paiement.label }}</label>
                    {{ form.mode_paiement }}
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{{ form.reference.label }}</label>
                    {{ form.reference }}
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button type="submit" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-lg transition-colors">
                    Encaisser
                </button>
                <a href="{% url 'ventes:liste' %}" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
