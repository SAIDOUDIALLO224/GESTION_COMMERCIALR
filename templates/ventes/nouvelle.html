{% extends 'base.html' %}

{% block title %}Nouvelle Vente - GesStock Madina{% endblock %}
{% block page_title %}Nouvelle Vente{% endblock %}

{% block content %}
<div class="card">
    <form method="post" id="vente-form">
        {% csrf_token %}
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div class="form-group">
                <label>{{ form.client.label }}</label>
                {{ form.client }}
            </div>
            
            <div class="form-group">
                <label>{{ form.mode_paiement.label }}</label>
                {{ form.mode_paiement }}
            </div>
            
            <div class="form-group">
                <label>{{ form.montant_paye.label }}</label>
                {{ form.montant_paye }}
            </div>
        </div>

        <h3 style="margin-bottom: 20px; color: #1e293b;">Produits</h3>
        
        <div id="produits-container" style="margin-bottom: 20px;">
            <div class="produit-ligne" style="display: grid; grid-template-columns: 2fr 1fr auto; gap: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0;">
                <div>
                    <label style="font-size: 12px; color: #64748b;">Produit</label>
                    <select name="produit_id" class="form-control">
                        <option value="">-- Sélectionner un produit --</option>
                        {% for produit in produits %}
                        <option value="{{ produit.id }}">{{ produit.nom }} ({{ produit.stock_actuel }} dispo)</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label style="font-size: 12px; color: #64748b;">Quantité</label>
                    <input type="number" name="quantite" step="0.001" class="form-control" placeholder="0">
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button type="button" class="btn btn-danger" onclick="this.parentElement.parentElement.remove();">✕</button>
                </div>
            </div>
        </div>
        
        <button type="button" class="btn btn-secondary" onclick="ajouterProduit();">+ Ajouter un produit</button>
        
        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button type="submit" class="btn btn-success">✓ Enregistrer la Vente</button>
            <a href="{% url 'ventes:liste' %}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>

<script>
function ajouterProduit() {
    const container = document.getElementById('produits-container');
    const html = `
        <div class="produit-ligne" style="display: grid; grid-template-columns: 2fr 1fr auto; gap: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0;">
            <div>
                <select name="produit_id" class="form-control">
                    <option value="">-- Sélectionner un produit --</option>
                    {% for produit in produits %}
                    <option value="{{ produit.id }}">{{ produit.nom }} ({{ produit.stock_actuel }} dispo)</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <input type="number" name="quantite" step="0.001" class="form-control" placeholder="0">
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button type="button" class="btn btn-danger" onclick="this.parentElement.parentElement.remove();">✕</button>
            </div>
        </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
}
</script>
{% endblock %}
